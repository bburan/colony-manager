<div id="confocal-image-table-container">
    <table class="table table-sm align-middle mb-0">
        <thead>
            <tr class="text-muted small text-uppercase">
                <th style="width: 5rem;">kHz</th>
                <th style="width: 11rem;">Status</th>
                <th>Files</th>
                <th style="width: 22%;">Notes</th>
                <th class="text-end" style="width: 5rem;">Action</th>
            </tr>
        </thead>
        {% for group in ear.confocal_images|groupby('image_type.name') %}
            <tbody>
                <tr class="table-light">
                    <td colspan="5" class="fw-semibold small text-uppercase text-muted py-1">
                        {{ group.grouper }}
                    </td>
                </tr>
            </tbody>
            {% for img in group.list|sort(attribute='frequency') %}
                {% include 'partials/confocal_image_row.html' %}
            {% endfor %}
        {% else %}
            <tbody>
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">No images added yet.</td>
                </tr>
            </tbody>
        {% endfor %}
    </table>
</div>
