<li class="list-group-item d-flex justify-content-between align-items-center py-3" id="datatype-{{ dt.id }}" data-name="{{ dt.name|lower }}">
    <div>
        <span class="fw-bold">{{ dt.name }}</span>
        <span class="badge bg-info text-dark ms-2">{{ dt.TARGET_LABEL }}</span>
        {% if dt.description %}<span class="text-muted ms-2 fst-italic">{{ dt.description }}</span>{% endif %}
        <div class="mt-1">
            {% if dt.is_folder %}
            <span class="badge bg-secondary">Folder</span>
            {% endif %}
            <small class="text-muted ms-2"><i class="fas fa-map-marker-alt"></i> {{ dt.locations.count() }} location(s)</small>
            {% if dt.description_class %}
                <small class="text-muted ms-2 font-monospace" title="{{ dt.description_class }}"><i class="fas fa-code"></i> {{ dt.description_class.split('.')|last }}</small>
            {% endif %}
        </div>
    </div>
    <div class="btn-group btn-group-sm flex-shrink-0">
        <button class="btn btn-link btn-sm text-secondary p-0 px-2"
                hx-get="{{ url_for('main.edit_datatype_modal', datatype_id=dt.id) }}"
                hx-target="#modalBody"
                data-bs-toggle="tooltip" title="Edit DataType"><i class="fas fa-pencil"></i></button>
        <form method="POST" action="{{ url_for('main.rematch_datatype', datatype_id=dt.id) }}"
              onsubmit="return confirm('Re-run target matching for all unmatched files in {{ dt.name }}?')">
            <button class="btn btn-link btn-sm text-primary p-0 px-2"
                    data-bs-toggle="tooltip" title="Re-run matching for unmatched files"><i class="fas fa-sync-alt"></i></button>
        </form>
        <form method="POST" action="{{ url_for('main.rematch_datatype', datatype_id=dt.id, force=1) }}"
              onsubmit="return confirm('Force-rematch ALL files in {{ dt.name }}? Existing target links and candidate animals/ears will be cleared and re-resolved from the parser.')">
            <button class="btn btn-link btn-sm text-warning p-0 px-2"
                    data-bs-toggle="tooltip" title="Force rematch (clear and re-resolve every row)"><i class="fas fa-rotate"></i></button>
        </form>
        <form hx-post="{{ url_for('main.delete_datatype', datatype_id=dt.id) }}"
              hx-target="closest li"
              hx-swap="outerHTML swap:300ms"
              hx-confirm="Are you sure you want to delete this DataType?">
            <button class="btn btn-link btn-sm text-danger p-0 px-2"><i class="fas fa-trash"></i></button>
        </form>
    </div>
</li>
