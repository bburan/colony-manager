<li class="list-group-item d-flex justify-content-between align-items-center py-3" id="datatype-{{ dt.id }}" data-name="{{ dt.name|lower }}">
    <div>
        <span class="fw-bold">{{ dt.name }}</span>
        {% if dt.description %}<span class="text-muted ms-2 fst-italic">{{ dt.description }}</span>{% endif %}
        <div class="mt-1">
            {% if dt.is_folder %}
            <span class="badge bg-secondary">Folder</span>
            {% endif %}
            <small class="text-muted ms-2"><i class="fas fa-map-marker-alt"></i> {{ dt.locations.count() }} location(s)</small>
            {% for cb in dt.callbacks %}
                <small class="text-muted ms-2" title="{{ cb.callback_function }}">
                    <i class="fas fa-{{ 'chart-line' if cb.callback_type == 'plot' else 'file-pdf' }}"></i> {{ cb.name }}
                </small>
            {% endfor %}
        </div>
    </div>
    <div class="btn-group btn-group-sm flex-shrink-0">
        <button class="btn btn-link btn-sm text-secondary p-0 px-2" 
                hx-get="{{ url_for('main.edit_datatype_modal', datatype_id=dt.id) }}" 
                hx-target="#modalBody"><i class="fas fa-pencil"></i></button>
        <form hx-post="{{ url_for('main.delete_datatype', datatype_id=dt.id) }}" 
              hx-target="closest li" 
              hx-swap="outerHTML swap:300ms"
              hx-confirm="Are you sure you want to delete this DataType?">
            <button class="btn btn-link btn-sm text-danger p-0 px-2"><i class="fas fa-trash"></i></button>
        </form>
    </div>
</li>
