{% import "macros.html" as macros %}
<form action="{{ submit_url }}" method="POST">
    <header class="modal-header">
        <h3 class="modal-title h6 fw-bold text-uppercase text-secondary">{{ label }}</h3>
    </header>
    <main class="modal-body">
        {% block main %}
        {{ form.hidden_tag() }}
        <input type="hidden" name="event_id" id="edit-event-id-{{ uid }}" value="">
        {%  for field in form if field.widget.input_type != 'hidden' %}
            {{ macros.render_field(field) }}
        {% endfor %}
        {% endblock %}
    </main>
    <footer class="modal-footer border-top-0 pb-4 px-4">
        <button type="button" class="btn btn-link btn-sm text-secondary text-decoration-none" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm px-3">Confirm</button>
    </footer>
</form>
