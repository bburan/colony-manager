<li class="list-group-item d-flex align-items-center" 
    x-data="{ isDirty: false, originalValues: {} }" 
    x-init="Array.from($el.querySelectorAll('input, select')).forEach(el => originalValues[el.name] = el.value)"
    data-name="{{ item.name|lower }}">
    
    <form id="update-setting-{{type}}-{{item.id}}" autocomplete="off"
        hx-post="{{ url_for('main.update_setting', item_type=type, item_id=item.id) }}"
        hx-target="closest li"
        hx-swap="outerHTML"
        class="d-flex flex-grow-1 align-items-center"
        @input="isDirty = Array.from($el.elements).some(el => el.name && el.value !== originalValues[el.name])">
        
        {{ form.hidden_tag() }}
        {% for field in form if field.widget_type != 'hidden' %}
        {{ field(class="form-control form-control-sm border-0 fw-medium") }}
        {% endfor %}
        
        <button type="submit" :disabled="!isDirty"
            class="btn btn-sm" :class="isDirty ? 'text-primary' : 'text-muted'">
            <i class="fas fa-save" hx-indicator="#indicator-{{type}}-{{item.id}}"></i>
        </button>
        <div id="indicator-{{type}}-{{item.id}}" class="htmx-indicator spinner-border spinner-border-sm text-primary ms-1" role="status"></div>
    </form>
    
    <form hx-post="{{ url_for('main.delete_setting', item_type=type, item_id=item.id) }}" 
          hx-target="closest li" 
          hx-swap="outerHTML swap:300ms"
          hx-confirm="Are you sure you want to delete this?">
        <button class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button>
    </form>
</li>
