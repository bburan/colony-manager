<div class="table-responsive">
    <table class="table table-hover small">
        <thead>
        <tr>
            <th>Animal ID</th>
            <th>Procedure</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        {% for event in upcoming_events %}
        <tr>
            <td>
                <a href="{{ url_for('animals.view_animal', animal_id=event.animal_id) }}" class="text-decoration-none text-primary">
                    {{ event.animal.custom_id }}
                </a>
            </td>
            <td>{{ event.procedure.name }}</td>
            <td>
                {{ event.scheduled_date.strftime('%b %d') }}
            </td>
            <td>
                <span class="badge {{ 'bg-danger' if event.scheduled_date < today else 'bg-secondary-subtle text-secondary' }} rounded-pill" style="padding: 0.35em 0.65em;">
                    {{ 'Overdue' if event.scheduled_date < today else 'Pending' }}
                </span>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="4">
                No upcoming events for the next 7 days.
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
