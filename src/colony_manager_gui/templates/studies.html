{% extends "base.html" %}

{% block header %}
Studies
{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
        Studies
        <button class="btn btn-sm" onclick="openModal('{{ url_for('studies.create_study_modal') }}')"><i class="fas fa-folder"> +</i></button>
    </div>

    <div class="list-group list-group-flush border-top">
        {% for study in studies %}
        <div class="list-group-item list-group-item-action p-3">
            <div class="row align-items-center">
                <div class="col">
                    <a href="{{ url_for('studies.view_study', study_id=study.id) }}" class="text-decoration-none">
                        <h5 class="h6 mb-1 text-primary fw-bold">{{ study.name }}</h5>
                        <p class="mb-0 text-muted small">
                            {{ study.description or "No description provided." }}
                        </p>
                    </a>
                </div>
                <div class="col-auto d-flex align-items-center gap-3">
                    <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3 py-2">
                        <i class="fas fa-paw me-1"></i>{{ study.animals.count() }} Animals
                    </span>
                </div>
            </div>
        </div>
        {% else %}
        <div class="p-5 text-center text-muted">
            <i class="fas fa-folder-open d-block mb-3 fs-3 opacity-25"></i>
            <p class="small text-uppercase fw-bold mb-0">No studies found</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
