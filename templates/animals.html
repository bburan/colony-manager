{% extends "base.html" %}

{% block header %}
Animal Overview
{% endblock %}

{% block content %}
<!-- Filter and Sort Controls -->
<div class="mb-4 p-4 bg-gray-50 rounded-lg space-y-4 md:space-y-0 md:flex justify-between items-center">
    <!-- Filters -->
    <div class="flex items-center gap-4">
        <div>
            <span class="text-sm font-medium text-gray-700 mr-2">Status:</span>
            <div class="inline-flex rounded-md shadow-sm">
                <a href="{{ url_for('view_animals', sort_by=sort_by, event_filter=event_filter, status_filter='active') }}" class="px-3 py-1 rounded-l-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if status_filter == 'active' else 'bg-white text-gray-700 hover:bg-gray-50' }}">Active</a>
                <a href="{{ url_for('view_animals', sort_by=sort_by, event_filter=event_filter, status_filter='terminated') }}" class="px-3 py-1 text-sm font-medium border-t border-b border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if status_filter == 'terminated' else 'bg-white text-gray-700 hover:bg-gray-50' }}">Terminated</a>
                <a href="{{ url_for('view_animals', sort_by=sort_by, event_filter=event_filter, status_filter='all') }}" class="px-3 py-1 rounded-r-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if status_filter == 'all' else 'bg-white text-gray-700 hover:bg-gray-50' }}">All</a>
            </div>
        </div>
        <div>
            <span class="text-sm font-medium text-gray-700 mr-2">Events:</span>
             <div class="inline-flex rounded-md shadow-sm">
                <a href="{{ url_for('view_animals', sort_by=sort_by, status_filter=status_filter, event_filter='all') }}" class="px-3 py-1 rounded-l-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if event_filter == 'all' else 'bg-white text-gray-700 hover:bg-gray-50' }}">All</a>
                <a href="{{ url_for('view_animals', sort_by=sort_by, status_filter=status_filter, event_filter='events') }}" class="px-3 py-1 text-sm font-medium border-t border-b border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if event_filter == 'events' else 'bg-white text-gray-700 hover:bg-gray-50' }}">Has Events</a>
                <a href="{{ url_for('view_animals', sort_by=sort_by, status_filter=status_filter, event_filter='no_events') }}" class="px-3 py-1 rounded-r-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if event_filter == 'no_events' else 'bg-white text-gray-700 hover:bg-gray-50' }}">No Events</a>
            </div>
        </div>
    </div>
    <!-- Sorting -->
    <div class="flex items-center gap-2">
        <span class="text-sm font-medium text-gray-700 mr-2">Sort by:</span>
        <div class="inline-flex rounded-md shadow-sm">
            <a href="{{ url_for('view_animals', event_filter=event_filter, status_filter=status_filter, sort_by='id') }}" class="px-3 py-1 rounded-l-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if sort_by == 'id' else 'bg-white text-gray-700 hover:bg-gray-50' }}">Animal ID</a>
            <a href="{{ url_for('view_animals', event_filter=event_filter, status_filter=status_filter, sort_by='age') }}" class="px-3 py-1 rounded-r-md text-sm font-medium border border-gray-300 {{ 'bg-blue-600 text-white border-blue-600' if sort_by == 'age' else 'bg-white text-gray-700 hover:bg-gray-50' }}">Age</a>
        </div>
    </div>
</div>

{% set show_cage_column = True %}
{% include 'partials/animal_table.html' %}

{% endblock %}
